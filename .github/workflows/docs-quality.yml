name: Docs quality

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  docs-quality:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run docs quality checks
        run: npm run qa:docs

      - name: Run strict docs checks (non-blocking baseline)
        continue-on-error: true
        run: npm run qa:docs:strict
